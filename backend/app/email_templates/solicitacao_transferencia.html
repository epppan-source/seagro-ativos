{% extends "base.html" %}
{% block conteudo %}
<p>Olá, <strong>{{ nome_gestor }}</strong>!</p>
<p><strong>{{ solicitante_nome }}</strong> solicitou a transferência do ativo <strong>{{ ativo_codigo }}</strong> para <strong>{{ novo_responsavel_nome }}</strong>.</p>
<p><strong>Motivo:</strong> {{ motivo }}</p>
<p><a href="{{ app_url }}/transferencias" style="background:#1d4e3c;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px;">Analisar solicitação</a></p>
{% endblock %}
