<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>{{ app_name }}</title></head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:24px 0;">
    <tr><td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
        <tr><td style="background:#1d4e3c;padding:20px 32px;">
          <span style="color:#ffffff;font-size:18px;font-weight:bold;">{{ app_name }}</span>
        </td></tr>
        <tr><td style="padding:32px;color:#1a1a1a;font-size:14px;line-height:1.6;">
          {% block conteudo %}{% endblock %}
        </td></tr>
        <tr><td style="background:#f0f0f0;padding:16px 32px;color:#888;font-size:12px;">
          E-mail automático do {{ app_name }}. Não responda esta mensagem.
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
